{% extends "user_side/user_profilebase.html" %}
{% load static %}

{% block profile_section_content %}

<div class="bg-white rounded-lg shadow-md p-6 max-w-md mx-auto text-center">
    <h2 class="text-2xl font-bold text-slate-900 mb-4">Verify New Email</h2>
    <p class="text-slate-600 mb-6">
        We sent a 6-digit OTP to your new email. Enter it below.
    </p>

    <form method="post" class="space-y-4">
        {% csrf_token %}
        <input type="text" name="otp" maxlength="6" inputmode="numeric"
               class="block w-full px-4 py-3 text-center text-2xl font-mono border border-slate-300 rounded-md focus:ring-2 focus:ring-sky-500 focus:border-sky-500"
               placeholder="000000" required autofocus>
        <button type="submit"
                class="w-full px-6 py-2 bg-sky-600 text-white font-medium rounded-md hover:bg-sky-700">
            Verify Email
        </button>
    </form>

    <div class="mt-6">
        <a href="{% url 'profile_detail' %}" class="text-sm text-slate-600 hover:underline">
            Back to Profile
        </a>
    </div>
</div>

{% endblock %}
