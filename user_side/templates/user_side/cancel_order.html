{% extends 'user_side/user_base.html' %}

{% block title %}Cancel Order{% endblock %}

{% block content %}
<div class="max-w-md mx-auto p-6">
  <h1 class="text-2xl font-bold mb-4">Cancel Order #{{ order.order_id }}</h1>
  <p class="text-gray-600 mb-6">Are you sure? This cannot be undone.</p>
  
  <form method="post">
    {% csrf_token %}
    <div class="mb-4">
      <label class="block text-sm font-medium text-gray-700 mb-2">Reason (Optional)</label>
      <textarea name="reason" rows="3" class="w-full border border-gray-300 rounded-md p-2" placeholder="Why are you cancelling?"></textarea>
    </div>
    <div class="flex gap-3">
      <button type="submit" class="flex-1 bg-red-600 text-white py-2 rounded-lg">Confirm Cancel</button>
      <a href="{% url 'order_detail' order.pk %}" class="flex-1 bg-gray-300 text-gray-700 py-2 rounded-lg text-center">Back</a>
    </div>
  </form>
</div>
{% endblock %}
