<!-- templates/user_side/cart_order_summary.html -->
<h3 class="text-xl font-bold mb-4">Order Summary</h3>
<div class="space-y-3 mb-6">
  <div class="flex justify-between text-gray-600">
    <span id="subtotal-label">Subtotal ({{ cart_items|length }} items)</span>
    <span id="subtotal-amount">₹{{ cart_total|floatformat:2 }}</span>
  </div>
  <div class="flex justify-between text-gray-600">
    <span>Shipping</span>
    <span class="text-green-600 font-bold">Free</span>
  </div>
  <div class="border-t pt-3">
    <div class="flex justify-between text-lg font-bold">
      <span>Total</span>
      <span id="grand-total">₹{{ cart_total|floatformat:2 }}</span>
    </div>
  </div>
</div>

{% if has_valid_items %}
<a href="{% url 'checkout' %}" class="w-full block text-center bg-green-600 hover:bg-green-700 text-white font-bold py-4 rounded-lg transition">
  Proceed to Checkout
</a>
{% else %}
<button disabled class="w-full bg-gray-400 text-gray-700 font-bold py-4 rounded-lg cursor-not-allowed">
  No items available
</button>
{% endif %}

<div class="mt-4 text-center">
  <a href="{% url 'product_list' %}" class="text-sm text-sky-600 hover:underline">Continue Shopping</a>
</div>
