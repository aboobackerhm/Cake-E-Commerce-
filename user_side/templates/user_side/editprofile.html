{% extends "user_side/user_profilebase.html" %}
{% load static %}

{% block profile_section_content %}
<div class="max-w-2xl mx-auto bg-white shadow-xl rounded-2xl p-8 mt-8">
    <h2 class="text-2xl font-bold text-slate-800 mb-6 text-center">Edit Profile</h2>

    <form method="POST" enctype="multipart/form-data" class="space-y-6">
        {% csrf_token %}

        <!-- Username -->
        <div>
            <label class="block text-sm font-semibold text-slate-700 mb-2">Username</label>
            <input type="text" name="username" value="{{ user.username }}" 
                   class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-sky-500">
        </div>

        <!-- Email -->
        <div>
            <label class="block text-sm font-semibold text-slate-700 mb-2">Email</label>
            <input type="email" name="email" value="{{ user.email }}" 
                   class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-sky-500">
        </div>

        <!-- Phone -->
        <div>
            <label class="block text-sm font-semibold text-slate-700 mb-2">Phone Number</label>
            <input type="text" name="phone" value="{{ profile.phone_number }}" 
                   class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-sky-500">
        </div>

        <!-- Address -->
        <div>
            <label class="block text-sm font-semibold text-slate-700 mb-2">Address</label>
            <textarea name="address" rows="3" 
                      class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-sky-500">{{ profile.address }}</textarea>
        </div>

        <!-- Profile Image -->
        <div class="flex flex-col items-center">
            {% if profile.image %}
                <img src="{{ profile.image.url }}" alt="Profile Image" 
                     class="w-28 h-28 object-cover rounded-full border-4 border-sky-500 shadow-md mb-3">
                <p class="text-sm text-gray-500 mb-2">Current Profile Picture</p>
            {% else %}
                <div class="w-28 h-28 bg-gray-200 rounded-full mb-3 flex items-center justify-center text-gray-500">No Image</div>
            {% endif %}
            
            <label class="block text-sm font-semibold text-slate-700 mb-2">Change Image</label>
            <input type="file" name="image" 
                   class="w-full text-sm text-slate-600 file:mr-4 file:py-2 file:px-4
                          file:rounded-lg file:border-0 file:text-sm file:font-semibold
                          file:bg-sky-50 file:text-sky-700 hover:file:bg-sky-100">
        </div>

        <!-- Buttons -->
        <div class="flex justify-center gap-4 mt-8">
            <button type="submit" 
                    class="px-6 py-2 text-white bg-green-600 rounded-lg shadow-md hover:bg-sky-700 focus:ring-2 focus:ring-sky-500">
                💾 Save Changes
            </button>
            <a href="{% url 'user_profile' %}" 
               class="px-6 py-2 text-sky-700 border border-sky-500 rounded-lg hover:bg-sky-50">
                Cancel
            </a>
        </div>
    </form>
</div>
{% endblock %}
