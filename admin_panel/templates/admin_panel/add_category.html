{% extends "admin_panel/base_admin.html" %}

{% block title %}Add Category{% endblock %}

{% block content %}
<div class="container d-flex justify-content-center">
  <div class="container-box">
    <h2 class="page-title">Add New Category</h2>

    <!-- Django messages -->
    {% if messages %}
      {% for message in messages %}
        <div class="alert alert-success text-center">{{ message }}</div>
      {% endfor %}
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label for="name" class="form-label">Category Name</label>
        <input type="text" class="form-control" id="name" name="name" placeholder="e.g. Cakes" required>
      </div>

      <div class="mb-3">
        <label for="description" class="form-label">Description</label>
        <textarea class="form-control" id="description" name="description" rows="3" placeholder="Enter category details..."></textarea>
      </div>

      <div class="d-flex justify-content-between mt-4">
        <a href="{% url 'category_management' %}" class="btn btn-secondary">Cancel</a>
        <button type="submit" class="btn btn-primary">Add Category</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
