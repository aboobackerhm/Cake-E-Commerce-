<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" /> -->

  <title>{% block title %}Admin Panel{% endblock %}</title>
  {% load static %}
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f8f9fa;
    }
    .sidebar {
      height: 100vh;
      width: 250px;
      position: fixed;
      top: 0;
      left: 0;
      background: #ffffffff;
      padding-top: 20px;
      color: #000000ff;
    }
    .sidebar h2 {
      text-align: center;
      margin-bottom: 30px;
      font-size: 1.5rem;
    }
    .sidebar a {
      display: block;
      padding: 12px 20px;
      margin: 8px 15px;
      border-radius: 8px;
      color: #000000ff;
      text-decoration: none;
      transition: 0.3s;
    }
    .sidebar a:hover {
      background: #8f7f7fff;
    }
    .content {
      margin-left: 260px;
      padding: 30px;
    }
    .logout-btn {
      background-color: #dc3545;
    }
    .logout-btn:hover {
      background-color: #bb2d3b;
    }
  </style>
</head>
<body>
  <!-- Sidebar -->
  <div class="sidebar">
    <h2>Admin Panel</h2>
    <a href="{% url 'admin_dashboard' %}">Dashboard</a>
    <a href="{% url 'user_management' %}">User Management</a>
    <a href="{% url 'category_management' %}">Category Management</a>
    <a href="{% url 'product_management' %}">Product Management</a>
    <a href="{% url 'order_management' %}">Order</a>
    <a href="{% url 'product_offer_list' %}">product offer</a>
    <a href="{% url 'category_offer_list' %}">categore offer</a>
    <a href="{% url 'coupon_list' %}" >Coupon</a>
    <a href="{% url 'admin_logout' %}" class="logout-btn text-center">Logout</a>
   
  </div>

  <!-- Main Content -->
  <div class="content">
    {% block content %}
    {% endblock %}
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
